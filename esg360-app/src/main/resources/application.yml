spring:
  application:
    name: esg360
  # UTC everywhere (BR-017); rendering in user/tenant timezone is presentation-layer
  jackson:
    time-zone: UTC
  datasource:
    # Local dev target is the docker-compose PostgreSQL 16 (see docker-compose.yml).
    # Overridden per environment; tests point this at a Testcontainers instance.
    url: ${ESG360_DB_URL:jdbc:postgresql://localhost:5432/esg360}
    username: ${ESG360_DB_USER:esg360}
    password: ${ESG360_DB_PASSWORD:esg360-local}
  flyway:
    # Plain-SQL, expand/contract migrations (ADR-0016/0017). Baseline lives under
    # classpath:db/migration; feature modules add their own locations later.
    enabled: true
    locations: classpath:db/migration
    # Flyway connects as the migration/owner role — NOT the runtime esg360_app role,
    # which has no DDL rights and no BYPASSRLS (ADR-0003).
  security:
    oauth2:
      resourceserver:
        jwt:
          # The tenant identity provider (module 03 req 3-001). No IdP is chosen yet
          # (ADR-0017 defers cloud/IdP), so this is intentionally unset and has NO
          # default: the application must FAIL TO START rather than come up without
          # token validation. Tenant isolation is derived from the token (SEC-001,
          # Critical), so "boots but authenticates nobody" is the one outcome worse
          # than "does not boot". Any OIDC-compliant issuer satisfies this.
          issuer-uri: ${ESG360_OIDC_ISSUER:}
          # Tests supply their own decoder from a generated keypair — see
          # com.esg360.app.testsupport.TestIdentityConfig. Never point this at a
          # committed key.

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
