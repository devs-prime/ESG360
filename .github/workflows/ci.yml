# CI (spec 43 pts 35–36): format check → build → unit + architecture +
# Testcontainers integration tests → SBOM. CodeQL SAST runs in codeql.yml;
# dependency scanning via Dependabot.
name: CI

on:
  push:
    branches: [main, "feat/**"]
  # All PRs, regardless of base — supports stacked feature branches.
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # verify = validate (spotless+checkstyle) → test (unit+ArchUnit) →
      # integration-test (Testcontainers against real PostgreSQL 16) → SBOM at package
      - name: Build, lint and test
        run: ./mvnw --batch-mode --no-transfer-progress verify

      # The jOOQ sources are committed (ADR-0017 + no Docker on every dev machine), which means
      # they can silently fall behind the migrations. Regenerate and diff: if a migration changed
      # without the sources being refreshed, fail here rather than let typed queries lie about the
      # schema. Fix by running the "jOOQ codegen" workflow on this branch, or locally with
      # `./mvnw -pl esg360-identity -Pjooq-codegen generate-sources`.
      - name: Check committed jOOQ sources match the migrations
        run: |
          set -euo pipefail
          ./mvnw --batch-mode --no-transfer-progress -pl esg360-identity -Pjooq-codegen generate-sources
          if ! git diff --quiet -- esg360-identity/src/main/jooq; then
            echo "::error::Committed jOOQ sources are stale — regenerate them (see the jOOQ codegen workflow)."
            git diff --stat -- esg360-identity/src/main/jooq
            exit 1
          fi
          echo "jOOQ sources are up to date with the migrations."

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/bom.*
          if-no-files-found: error

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/target/*-reports/**"
